name: "✨ 功能建议"
description: "提出新功能或改进现有功能的建议"
title: "【功能建议】"
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您的功能建议！请尽可能详细地描述您的想法，帮助我们更好地理解需求。

  - type: textarea
    id: feature-description
    attributes:
      label: "功能描述"
      description: "请清晰描述您希望添加的功能"
      placeholder: "我希望能够..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "解决的问题"
      description: "这个功能解决了什么问题？或者满足了什么使用需求？"
      placeholder: "目前我在使用时遇到了...（没有强制要求，描述背景即可）"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: "建议的实现方式（可选）"
      description: "如果您有具体的实现想法，请描述"
      placeholder: "可以通过...方式实现，例如..."
    validations:
      required: false

  - type: dropdown
    id: related-module
    attributes:
      label: "相关模块（可选）"
      description: "您的建议主要涉及哪个模块？"
      options:
        - "文件上传"
        - "文件浏览"
        - "文件预览"
        - "文件操作（重命名/复制/移动/删除）"
        - "图片压缩"
        - "文件名模板"
        - "配置管理"
        - "多语言支持"
        - "主题/外观"
        - "PWA 支持"
        - "其他"
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "优先级（可选）"
      description: "您认为这个功能的优先级如何？"
      options:
        - "低 - 锦上添花"
        - "中 - 比较实用"
        - "高 - 强烈需要"
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: "替代方案（可选）"
      description: "您是否考虑过其他解决方式？"
      placeholder: "我也考虑过...，但认为..."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: "补充信息（可选）"
      description: "任何有助于理解需求的补充信息，如截图、参考链接等"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: "确认"
      options:
        - label: "我已搜索过现有的 issue，确认这是一个新的功能建议"
          required: true
        - label: "我理解这是一个开源项目，维护者会根据情况评估是否实现"
          required: true
